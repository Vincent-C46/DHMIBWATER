name: Slack Notification

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Message
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            TEXT="🚀 *dev* 브랜치에 새 코드가 푸시되었습니다!\n> *작업자:* ${{ github.actor }}\n> *메시지:* ${{ github.event.head_commit.message }}"
          else
            TEXT="🔍 *dev* 브랜치로 새로운 PR이 도착했습니다!\n> *보낸 사람:* ${{ github.actor }}\n> *제목:* ${{ github.event.pull_request.title }}\n> <${{ github.event.pull_request.html_url }}|PR 확인하기>"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$TEXT\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
